name = "dark-dl-api"
main = "functions/api/download.py"
compatibility_date = "2024-12-18"

[build]
command = "pip install -r requirements.txt -t ./vendor"

[functions]
python = "python3.9"

[vars]
ENVIRONMENT = "production"
API_VERSION = "1.0.0"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.staging]
vars = { ENVIRONMENT = "staging" }

[pages]
build_output_dir = "public"
